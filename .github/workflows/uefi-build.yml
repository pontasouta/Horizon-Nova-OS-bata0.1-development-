    - name: Build summary
      if: success()
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✓ UEFI kernel built successfully" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        ls -lh myoskernel.* >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

  qemu-test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies-v4
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          llvm \
          lld \
          binutils \
          qemu-system-x86-64 \
          ovmf
    
    - name: Build UEFI kernel
      run: |
        cd ${{ github.workspace }}
        make all
    
    - name: Test with QEMU (timeout 5 seconds)
      run: |
        timeout 5 qemu-system-x86_64 \
          -bios /usr/share/ovmf/OVMF.fd \
          -drive file=esp.img,format=raw,if=ide \
          -serial mon:stdio \
          -nographic || true
        echo "✓ QEMU boot test completed"
      timeout-minutes: 1
