name: UEFI OS Build CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/upload-artifact@v4
      with:
        
        name: source-code-v4
        path: .
        overwrite: true
    
    - name: Install dependencies-v4
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          llvm \
          lld \
          binutils \
          qemu-system-x86-64
    
    - name: Build UEFI kernel-v4
      run: |
        cd ${{ github.workspace }}
        make all
    
