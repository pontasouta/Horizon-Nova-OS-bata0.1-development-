name: UEFI OS Build CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang llvm lld binutils

    - name: Build UEFI kernel
      run: |
        cd boot    
        make -B


    - name: Verify binaries
      run: |
        if [ -f myoskernel.efi ]; then
          echo "✓ EFI binary created"
          file myoskernel.efi
        else
          echo "✗ EFI binary NOT found"
          exit 1
        fi

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: uefi-kernel-artifacts
        path: |
          myoskernel.efi
          # esp/ がある場合はここに追加
        retention-days: 7

  qemu-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: uefi-kernel-artifacts

    - name: Install QEMU and OVMF
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-system-x86-64 ovmf

    - name: Test with QEMU
      run: |
        # 終了コード124(timeout)を許容するように設定
        timeout 5s qemu-system-x86_64 \
          -bios /usr/share/ovmf/OVMF.fd \
          -net none \
          -serial stdio \
          -display none \
          -device loader,file=myoskernel.efi || [ $? -eq 124 ]
        echo "✓ QEMU boot test finished"

    - name: Build summary
      if: success()
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "✓ UEFI kernel built and tested in QEMU" >> $GITHUB_STEP_SUMMARY
        echo "### Binary Info" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        ls -lh myoskernel.efi >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
